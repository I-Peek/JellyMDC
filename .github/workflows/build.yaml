name: Build & Release Plugin

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

env:
  PLUGIN_NAME: "JellyMDC"
  PLUGIN_GUID: "7f3b2a14-9c6d-4e8f-b1a2-3c4d5e6f7a8b"
  VERSION: "1.0.0.1"
  TARGET_ABI: "10.11.0.0"
  DLL_NAME: "Jellyfin.Plugin.MetadataOverride.dll"
  PROJECT: "Jellyfin.Plugin.MetadataOverride/Jellyfin.Plugin.MetadataOverride.csproj"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build
        run: dotnet publish "${{ env.PROJECT }}" -c Release -o publish

      - name: Package plugin (only our DLL + meta.json)
        run: |
          set -e
          mkdir -p staging
          cp "publish/${{ env.DLL_NAME }}" staging/
          cp "Jellyfin.Plugin.MetadataOverride/meta.json" staging/
          ZIP="metadata-override_${{ env.VERSION }}.zip"
          (cd staging && zip -r "../${ZIP}" .)
          echo "ZIP=${ZIP}" >> "$GITHUB_ENV"
          CHECKSUM=$(md5sum "${ZIP}" | cut -d ' ' -f1)
          echo "CHECKSUM=${CHECKSUM}" >> "$GITHUB_ENV"
          echo "Gebaut: ${ZIP} (md5 ${CHECKSUM})"

      - name: Generate repository manifest
        run: |
          set -e
          TAG="v${{ env.VERSION }}"
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIP}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > manifest.json <<EOF
          [
            {
              "guid": "${{ env.PLUGIN_GUID }}",
              "name": "${{ env.PLUGIN_NAME }}",
              "description": "Behaelt deine manuellen Metadaten nach Refreshes und Datei-Umbenennungen.",
              "overview": "Eigene Metadaten-Overrides pro Film, zugeordnet ueber TMDB-/IMDB-ID.",
              "owner": "${{ github.repository_owner }}",
              "category": "Metadata",
              "versions": [
                {
                  "version": "${{ env.VERSION }}",
                  "changelog": "Erste Version: ueberschreibt Titel, Sortiertitel, Beschreibung, Genres und Tags fuer Filme.",
                  "targetAbi": "${{ env.TARGET_ABI }}",
                  "sourceUrl": "${SOURCE_URL}",
                  "checksum": "${CHECKSUM}",
                  "timestamp": "${TIMESTAMP}"
                }
              ]
            }
          ]
          EOF
          echo "----- manifest.json -----"
          cat manifest.json

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "v${{ env.VERSION }}"
          body: "Automatisch gebautes Jellyfin-Plugin."
          files: |
            ${{ env.ZIP }}
            manifest.json

      - name: Show the URL for Jellyfin
        run: |
          {
            echo "## Fertig! 🎉"
            echo ""
            echo "Trage **diese URL** in Jellyfin als Plugin-Repository ein:"
            echo ""
            echo '```'
            echo "https://github.com/${{ github.repository }}/releases/latest/download/manifest.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
