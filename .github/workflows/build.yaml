- name: Generate & commit manifest.json
        run: |
          set -e
          TAG="v${{ env.VERSION }}"
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIP}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          NEW_VERSION="{\"version\":\"${{ env.VERSION }}\",\"changelog\":\"${{ env.CHANGELOG }}\",\"targetAbi\":\"${{ env.TARGET_ABI }}\",\"sourceUrl\":\"${SOURCE_URL}\",\"checksum\":\"${CHECKSUM}\",\"timestamp\":\"${TIMESTAMP}\"}"

          if [ -f manifest.json ]; then
            python3 - <<'PY'
          import json, os
          new_v = json.loads(os.environ["NEW_VERSION"])
          with open("manifest.json") as f:
              data = json.load(f)
          data[0]["versions"] = [v for v in data[0]["versions"] if v["version"] != new_v["version"]]
          data[0]["versions"].insert(0, new_v)
          with open("manifest.json", "w") as f:
              json.dump(data, f, indent=2)
          PY
          else
            cat > manifest.json <<MANIFEST
          [
            {
              "guid": "${{ env.PLUGIN_GUID }}",
              "name": "${{ env.PLUGIN_NAME }}",
              "description": "Behaelt deine manuellen Metadaten nach Refreshes und Datei-Umbenennungen.",
              "overview": "Eigene Metadaten-Overrides pro Film, zugeordnet ueber TMDB-/IMDB-ID.",
              "owner": "${{ github.repository_owner }}",
              "category": "Metadata",
              "versions": [${NEW_VERSION}]
            }
          ]
          MANIFEST
          fi

        env:
          NEW_VERSION: ${{ toJSON(env.NEW_VERSION) }}

      - name: Commit manifest.json zurück in den Branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --cached --quiet || git commit -m "ci: manifest fuer v${{ env.VERSION }} aktualisiert"
          git push

      - name: Create / update GitHub Release (nur ZIP)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}"
          name: "v${{ env.VERSION }}"
          body: "Automatisch gebautes Jellyfin-Plugin."
          files: ${{ env.ZIP }}

      - name: Show the URL for Jellyfin
        run: |
          {
            echo "## Fertig! 🎉"
            echo ""
            echo "Trage **diese URL** in Jellyfin als Plugin-Repository ein:"
            echo ""
            echo '```'
            echo "https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
